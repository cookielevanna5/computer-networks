when:
  event: pull_request
  branch:
    - main

skip_clone: true

steps:
  commitizen:
    image: python:3.14.3-slim
    commands:
      - pip install commitizen
      - cz check --message "$CI_COMMIT_MESSAGE"

  semantic-release:
    image: python:3.14.3-slim
    commands:
      - pip install python-semantic-release
      - apt-get update && apt-get install -y git

      # Define branches
      - export SRC="$CI_COMMIT_SOURCE_BRANCH"
      - export TGT="$CI_COMMIT_TARGET_BRANCH"
      - git clone "$CI_REPO_CLONE_URL" && cd "$CI_REPO_NAME" && git checkout "$CI_COMMIT_BRANCH"

      # --- Check squash merge ---
      - |
        echo "Checking squash merge from $SRC into $TGT"

        if git merge --squash "origin/$SRC"; then
          echo "✅ No conflicts"

          # Show commits that would be merged
          echo "Commits to be merged:"
          git log --oneline "origin/$TGT..origin/$SRC"

          echo "Running semantic-release dry run..."
          git commit -m "$CI_COMMIT_MESSAGE" --allow-empty
          semantic-release -v --noop --config releaserc.toml version --print
        else
          echo "❌ Merge conflicts detected"
          git merge --abort || true
          exit 1
        fi
