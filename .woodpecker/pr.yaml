when:
  event:
    - pull_request
    - pull_request_metadata
  branch: main

steps:
  entry:
    image: busybox
    commands:
      - mkdir -p /tmp/${CI_REPO_NAME}
      - cp -r $${CI_WORKSPACE}/. /tmp/${CI_REPO_NAME}/
      - ls -l /tmp/${CI_REPO_NAME}

  env:
    image: busybox
    commands:
      - env
      - ls -l /tmp/${CI_REPO_NAME} || true
    failure: ignore

services:
  srv:
    image: busybox
    ports:
      - 5432
    commands:
      - cp -r config /etc/configs
      - ls -l /etc/configs
