when:
  event:
    - pull_request
    - pull_request_metadata
  branch: main

steps:
  env:
    image: busybox
    commands:
      - env
      - ls -l /etc/configs || true
    failure: ignore

services:
  srv:
    image: busybox
    ports:
      - 5432
    commands:
      - cp -r config /etc/configs
      - ls -l /etc/configs
