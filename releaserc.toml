[semantic_release]
commit_message = "{version} [skip ci]\n\nAutomatically generated by python-semantic-release"
commit_parser = "conventional"
tag_format = "v{version}"
version_toml = [
    "pyproject.toml:project.version:tf",
]
version_variables = [
    ".cz.yaml:version:tf"
]

[semantic_release.branches.main]
match = "^(main|master)$"
prerelease = false

[semantic_release.branches.dev]
match = "dev"
prerelease_token = "rc"
prerelease = true

[tool.semantic_release.changelog]
template_dir = "config/release-templates"
insertion_flag = "=========\nCHANGELOG\n========="
mode = "update"
