[semantic_release]
commit_message = "{version} [skip ci]\n\nAutomatically generated by python-semantic-release"
commit_parser = "conventional"
tag_format = "v{version}"

[semantic_release.branches.main]
match = "(main|master)"
prerelease = false

[semantic_release.branches.dev]
match = "dev"
prerelease_token = "rc"
prerelease = true
