repos:
  - repo: local
    hooks:
      - id: black
        name: Black (auto-format Python)
        entry: black
        language: python
        additional_dependencies: ["black==23.12.1"]
        types: [python]

      - id: isort
        name: isort (sort imports)
        entry: isort
        language: python
        additional_dependencies: ["isort==5.13.2"]
        types: [python]

      - id: flake8
        name: flake8 (lint - non blocking)
        entry: flake8
        language: python
        additional_dependencies: ["flake8==7.0.0"]
        types: [python]
        args: ["--exit-zero"]

      - id: gitlint
        name: gitlint (Conventional Commits)
        entry: gitlint --msg-filename
        language: python
        additional_dependencies: ["gitlint"]
        stages: [commit-msg]
