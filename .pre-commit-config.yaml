repos:
  - repo: local
    hooks:
      - id: black
        name: Black (auto-format Python)
        entry: black .
        language: system
        types: [python]

      - id: isort
        name: isort (sort imports)
        entry: isort .
        language: system
        types: [python]

      - id: flake8
        name: flake8 (lint)
        entry: flake8
        language: system
        types: [python]
        args: ["--exit-zero"]

      # - id: commitizen
      #   name: commitizen (enforce Conventional Commits)
      #   entry: cz check --commit-msg-file
      #   language: python
      #   stages: [commit-msg]

      - id: gitlint
        name: gitlint (Conventional Commits)
        entry: gitlint --msg-filename
        language: system
        stages: [commit-msg]
